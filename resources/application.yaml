---
metadata:
  pipeline_version: "1.0.0"

logging:
  version: 1
  disable_existing_loggers: false
  handlers:
    console:
      class: logging.StreamHandler
      level: DEBUG
  root:
    level: DEBUG
    handlers: [console]

asset_folders:
  camera: "cam"
  character: "char"
  environment: "env"
  light: "light"
  props: "prop"
  temp: "temp"

